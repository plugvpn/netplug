# Copy .env.example to .env and set secrets and publish ports.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILES:-3}

services:
  netplug:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.24}
        GIT_COMMIT: ${GIT_COMMIT:-}
    #image: ${IMAGE_NAME:-netplug-wireguard}:${IMAGE_TAG:-latest}
    container_name: ${NETPLUG_CONTAINER_NAME:-netplug-wireguard}
    restart: ${NETPLUG_RESTART_POLICY:-unless-stopped}
    init: true
    logging: *default-logging
    env_file:
      - path: .env
        required: false
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      # - NET_RAW   # Uncomment on Podman if raw sockets fail
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "${DASHBOARD_PORT:-127.0.0.1:8080}:8080/tcp"
    environment:
      DATA_DIR: ${DATA_DIR:-/data}
      SQLITE_PATH: ${SQLITE_PATH:-/data/netplug.sqlite}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WIREGUARD_SYNC_INTERVAL_SEC: ${WIREGUARD_SYNC_INTERVAL_SEC:-30}
      NETPLUG_PCQ_DISABLE: ${NETPLUG_PCQ_DISABLE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    volumes:
      - ${DATA_PATH:-./data}:/data
      - /lib/modules:/lib/modules:ro
    deploy:
      resources:
        limits:
          cpus: ${CPU_LIMIT:-1.0}
          memory: ${MEMORY_LIMIT:-512M}
        reservations:
          memory: ${MEMORY_RESERVATION:-128M}
    networks:
      - netplug

networks:
  netplug:
    driver: bridge
