services:
  dashboard:
    build: .
    container_name: netplug-dashboard
    ports:
      - "3000:3000/tcp"
      - "51820:51820/udp"
    environment:
      NODE_ENV: "production"
      DATABASE_URL: "file:/data/prod.db"
      DATA_DIR: /data
      AUTH_SECRET: "supersecretkey"
      AUTH_URL: "http://localhost:3000"
    volumes:
      - $PWD/sandbox:/data
    restart: unless-stopped
    networks:
      - netplug-network

networks:
  netplug-network:
    driver: bridge
